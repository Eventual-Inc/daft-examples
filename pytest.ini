[pytest]
# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Console output options
console_output_style = progress
addopts =
    # Verbose output
    -v
    # Show local variables in tracebacks
    -l
    # Show summary of all test outcomes
    -ra
    # Strict markers - all markers must be registered
    --strict-markers
    # Show extra test summary info
    --tb=short
    # Color output
    --color=yes

# Timeout defaults (requires pytest-timeout)
timeout = 120
timeout_method = thread

# Test markers
markers =
    unit: Unit tests that don't require external dependencies or long execution time
    integration: Integration tests that may require external services or longer execution time
    slow: Tests that take a long time to run
    requires_credentials: Tests that require API credentials to run
    requires_openai: Tests that require OpenAI API key
    requires_turbopuffer: Tests that require Turbopuffer API key

# Disable warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum Python version
minversion = 3.12

# Coverage options (if using pytest-cov)
[coverage:run]
source = quickstart,usage_patterns,use_cases
omit =
    */tests/*
    */test_*.py
    */__init__.py

[coverage:report]
# Fail if coverage is below this threshold
fail_under = 70
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
