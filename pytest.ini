[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*

addopts =
    -v
    --tb=short
    --color=yes
    --strict-markers

timeout = 120
timeout_method = thread

markers =
    credentials: test requires API keys or cloud credentials

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

minversion = 3.12
