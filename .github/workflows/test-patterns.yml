name: Test Patterns & Use Cases

on:
  push:
    branches: [main]
    paths:
      - 'usage_patterns/**'
      - 'use_cases/**'
      - '.github/workflows/test-patterns.yml'
      - 'pytest.ini'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'usage_patterns/**'
      - 'use_cases/**'
      - '.github/workflows/test-patterns.yml'
      - 'pytest.ini'
      - 'pyproject.toml'
  workflow_dispatch:
  schedule:
    # Run daily at 00:00 UTC to catch dependency drift
    - cron: '0 0 * * *'

# Cancel in-progress CI runs for outdated PR pushes to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  skipcheck:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.filter.outputs.skip }}
    steps:
    - uses: actions/checkout@v4

    - name: Detect non-trivial changes
      id: filter
      run: |
        set +e
        set -xo pipefail

        # On main branch or scheduled runs, we want to run all tests
        if [ "${{ github.ref }}" = "refs/heads/main" ] || [ "${{ github.event_name }}" = "schedule" ]; then
          echo "skip=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        # For PRs, check if there are non-trivial changes
        BASE=${{ github.base_ref || 'origin/main' }}
        git fetch origin $BASE --depth=1

        if git diff --quiet origin/$BASE -- \
          . \
          ':!README.md' \
          ':!docs/**' \
          ':!*.md' \
          ':!.gitignore'
        then
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

  test-patterns:
    name: Test ${{ matrix.category }}/${{ matrix.example }}
    runs-on: ubuntu-latest
    needs: skipcheck
    if: ${{ needs.skipcheck.outputs.skip == 'false' }}
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
        include:
          # Critical patterns - test these regularly
          - category: 'usage_patterns/prompt'
            example: 'prompt_openai_web_search.py'
          - category: 'usage_patterns/io'
            example: 'read_audio_file.py'
          - category: 'usage_patterns/io'
            example: 'read_pdfs.py'
          - category: 'usage_patterns/io'
            example: 'read_video_files.py'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            uv venv .venv
            source .venv/bin/activate
            uv pip install -e .

      - name: Create .env file
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          EOF

      - name: Run example
        run: |
          source .venv/bin/activate
          uv run ${{ matrix.category }}/${{ matrix.example }}
        timeout-minutes: 10

  test-use-cases:
    name: Test Use Case - ${{ matrix.example }}
    runs-on: ubuntu-latest
    needs: skipcheck
    if: ${{ needs.skipcheck.outputs.skip == 'false' }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']
        example:
          # Only test standalone use cases (not S3-dependent)
          - 'voice_ai_analytics/voice_ai_analytics.py'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            uv venv .venv
            source .venv/bin/activate
            uv pip install -e .

      - name: Create .env file
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          EOF

      - name: Run use case
        run: |
          source .venv/bin/activate
          uv run use_cases/${{ matrix.example }}
        timeout-minutes: 15

  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-patterns, test-use-cases]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test-patterns.result }}" = "success" ] && [ "${{ needs.test-use-cases.result }}" = "success" ]; then
            echo "✅ All pattern tests passed!"
            exit 0
          else
            echo "❌ Some pattern tests failed"
            echo "Patterns: ${{ needs.test-patterns.result }}"
            echo "Use cases: ${{ needs.test-use-cases.result }}"
            exit 1
          fi
