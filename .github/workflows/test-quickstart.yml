name: Test Quickstart Examples

on:
  push:
    branches: [main]
    paths:
      - 'quickstart/**'
      - 'tests/quickstart/**'
      - '.github/workflows/test-quickstart.yml'
      - 'pytest.ini'
      - 'pyproject.toml'
  pull_request:
    branches: [main]
    paths:
      - 'quickstart/**'
      - 'tests/quickstart/**'
      - '.github/workflows/test-quickstart.yml'
      - 'pytest.ini'
      - 'pyproject.toml'
  workflow_dispatch:  # Allow manual triggers

# Cancel in-progress CI runs for outdated PR pushes to save resources
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  skipcheck:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.filter.outputs.skip }}
    steps:
    - uses: actions/checkout@v4

    - name: Detect non-trivial changes
      id: filter
      run: |
        set +e
        set -xo pipefail

        # On main branch, we want to run all tests (no skipping)
        if [ "${{ github.ref }}" = "refs/heads/main" ]; then
          echo "skip=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        # For PRs, check if there are non-trivial changes
        BASE=${{ github.base_ref || 'origin/main' }}
        git fetch origin $BASE --depth=1

        if git diff --quiet origin/$BASE -- \
          . \
          ':!README.md' \
          ':!docs/**' \
          ':!*.md' \
          ':!.gitignore'
        then
          echo "skip=true" >> $GITHUB_OUTPUT
        else
          echo "skip=false" >> $GITHUB_OUTPUT
        fi

  test-quickstart:
    name: Test ${{ matrix.example }} (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: skipcheck
    if: ${{ needs.skipcheck.outputs.skip == 'false' }}
    timeout-minutes: 15

    strategy:
      fail-fast: false  # Continue testing other examples if one fails
      matrix:
        python-version: ['3.12']
        example:
          - '01_hello_world_prompt.py'
          - '02_semantic_search.py'
          - '03_data_enrichment.py'
          - '04_audio_file.py'
          - '05_video_file.py'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            uv venv .venv
            source .venv/bin/activate
            uv pip install -e .

      - name: Create .env file
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          TURBOPUFFER_API_KEY=${{ secrets.TURBOPUFFER_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          EOF

      - name: Run example
        run: |
          source .venv/bin/activate
          uv run quickstart/${{ matrix.example }}
        env:
          PYTHONUNBUFFERED: "1"

      - name: Check for output artifacts
        if: matrix.example == '03_data_enrichment.py'
        run: |
          if [ -d "enriched-comments" ]; then
            echo "✓ Output artifacts created successfully"
          else
            echo "⚠ Expected output directory not found"
            exit 1
          fi

  test-with-pytest:
    name: Run pytest suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: skipcheck
    if: ${{ needs.skipcheck.outputs.skip == 'false' }}
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.12']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python and uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
          cache-dependency-glob: "**/pyproject.toml"

      - name: Install system dependencies (FFmpeg)
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies with retry
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            uv venv .venv
            source .venv/bin/activate
            uv pip install -e ".[test]"

      - name: Create .env file
        run: |
          cat > .env << EOF
          OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }}
          TURBOPUFFER_API_KEY=${{ secrets.TURBOPUFFER_API_KEY }}
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          EOF

      - name: Run unit tests
        run: |
          source .venv/bin/activate
          pytest -n auto -m unit tests/quickstart/ --cov=quickstart --cov-report=xml --cov-report=term
        env:
          PYTHONUNBUFFERED: "1"

      - name: Run integration tests
        run: |
          source .venv/bin/activate
          pytest -n auto -m integration tests/quickstart/ --cov=quickstart --cov-append --cov-report=xml --cov-report=term
        env:
          PYTHONUNBUFFERED: "1"

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          flags: quickstart
          name: quickstart-coverage

  test-quickstart-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [test-quickstart, test-with-pytest]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.test-quickstart.result }}" = "success" ] && [ "${{ needs.test-with-pytest.result }}" = "success" ]; then
            echo "✅ All quickstart tests passed!"
            exit 0
          else
            echo "❌ Some quickstart tests failed"
            echo "Direct examples: ${{ needs.test-quickstart.result }}"
            echo "Pytest suite: ${{ needs.test-with-pytest.result }}"
            exit 1
          fi
